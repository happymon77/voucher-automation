// ── 드롭다운 옵션 동적 생성 ──────────────────────────────────
function populateDropdown(selId, values) {
  const sel = document.getElementById(selId);
  [...new Set(values)].filter(Boolean).sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = v;
    sel.appendChild(opt);
  });
}
populateDropdown('f-writer',   DATA.map(v => v.writer));
populateDropdown('f-currency', DATA.map(v => v.currency));

// ── 금액 포맷 ────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '';
  return Number(n).toLocaleString('ko-KR');
}

// ── 전표 행 HTML ─────────────────────────────────────────────
function vrowHtml(v, idx) {
  const balBadge = v.balanced === 'O'
    ? '<span class="badge badge-ok">O</span>'
    : '<span class="badge badge-bad">X</span>';

  const matchBadge = v.matched
    ? `<span class="badge badge-ok ev-btn" onclick="openEv(event,v_${idx})">매칭</span>`
    : `<span class="badge badge-warn ev-btn" onclick="openEv(event,v_${idx})">NG</span>`;

  const vnoCell = v.pdf_jyo
    ? `<span class="vno-link" onclick="openPdf(event,'${v.pdf_jyo}')">${v.vno}</span>`
    : v.vno;

  return `<tr class="v-row" data-idx="${idx}" onclick="toggleLines(this)">
    <td><span class="toggle-btn">▶</span></td>
    <td><span class="src-badge">${v.src}</span></td>
    <td>${vnoCell}</td>
    <td><span class="badge badge-gray">${v.vtype}</span></td>
    <td>${v.date}</td>
    <td>${v.vendor}</td>
    <td>${v.writer}</td>
    <td class="amt">${fmt(v.dr_total)}</td>
    <td class="amt">${fmt(v.cr_total)}</td>
    <td>${balBadge}</td>
    <td>${matchBadge}</td>
    <td style="color:#999;font-size:11px">${v.bigo}</td>
  </tr>`;
}

// ── 분개 라인 HTML ───────────────────────────────────────────
function linesHtml(v, idx) {
  if (!v.lines.length) return '';
  return v.lines.map(l => `
    <tr class="line-row" data-parent="${idx}">
      <td colspan="2"></td>
      <td colspan="2" style="color:#555">
        <span style="color:#1a6e3a;font-weight:600">차)</span>
        ${l.dr_code} ${l.dr_name}
        ${l.dr_bp ? `<span style="color:#888">(${l.dr_bp})</span>` : ""}
      </td>
      <td class="amt" style="color:#1a6e3a">${fmt(l.dr_amt)}</td>
      <td colspan="2" style="color:#888;font-size:11px">${l.dr_desc}</td>
      <td colspan="2" style="color:#555">
        <span style="color:#b82020;font-weight:600">대)</span>
        ${l.cr_code} ${l.cr_name}
        ${l.cr_bp ? `<span style="color:#888">(${l.cr_bp})</span>` : ""}
      </td>
      <td class="amt" style="color:#b82020">${fmt(l.cr_amt)}</td>
      <td colspan="2" style="color:#888;font-size:11px">${l.cr_desc}</td>
    </tr>`).join('');
}

// ── PDF 뷰어 ────────────────────────────────────────────────
let _viewerFiles = [];
let _viewerIdx   = 0;
let _zoomLevels  = [50, 75, 100, 125, 150, 175, 200];
let _zoomIdx     = 2;  // 기본 100%

function openViewer(e, files, title) {
  e.stopPropagation();
  if (!files || files.length === 0) {
    alert('PDF 파일이 없습니다.');
    return;
  }
  _viewerFiles = files;
  _viewerIdx   = 0;
  _zoomIdx     = 2;
  document.getElementById('viewer-title').textContent = title;
  renderViewerTabs();
  loadViewerFile(0);
  applyZoom();
  document.getElementById('viewer-backdrop').classList.add('open');
}

function renderViewerTabs() {
  const tabs = document.getElementById('viewer-tabs');
  tabs.innerHTML = _viewerFiles.map((f, i) => {
    const label = f.includes('_전표') ? '전표'
                : f.replace(/.*_증빙(\d+)\.pdf/, '증빙$1');
    return `<span class="vtab ${i===_viewerIdx?'active':''}" onclick="loadViewerFile(${i})">${label}</span>`;
  }).join('');
}

function loadViewerFile(idx) {
  _viewerIdx = idx;
  const iframe = document.getElementById('viewer-iframe');
  iframe.src = _viewerFiles[idx];
  // 탭 active 갱신
  document.querySelectorAll('.vtab').forEach((t,i) =>
    t.classList.toggle('active', i === idx));
}

function applyZoom() {
  const pct = _zoomLevels[_zoomIdx];
  const iframe = document.getElementById('viewer-iframe');
  iframe.style.transform = `scale(${pct/100})`;
  iframe.style.marginBottom = `${(pct/100 - 1) * 1100}px`;
  document.getElementById('zoom-level').textContent = pct + '%';
}

function zoomStep(dir) {
  _zoomIdx = Math.max(0, Math.min(_zoomLevels.length - 1, _zoomIdx + dir));
  applyZoom();
}

function zoomFit() {
  _zoomIdx = 2;  // 100%
  applyZoom();
}

function closeViewer(e) {
  if (e && e.target !== document.getElementById('viewer-backdrop')) return;
  document.getElementById('viewer-backdrop').classList.remove('open');
  document.getElementById('viewer-iframe').src = '';
}

function openPdf(e, path) {
  openViewer(e, [path], path.split('/').pop().replace('_전표.pdf',''));
}

function openEv(e, v) {
  e.stopPropagation();
  if (!v || !v.pdf_jeung || v.pdf_jeung.length === 0) {
    alert('증빙 PDF 파일이 없습니다.');
    return;
  }
  openViewer(e, v.pdf_jeung, '전표 ' + v.vno + ' 증빙');
}

// ── 펼치기/접기 ──────────────────────────────────────────────
function toggleLines(row) {
  const idx = row.dataset.idx;
  const isOpen = row.classList.contains('open');
  row.classList.toggle('open', !isOpen);
  row.querySelector('.toggle-btn').textContent = isOpen ? '▶' : '▼';
  document.querySelectorAll(`.line-row[data-parent="${idx}"]`).forEach(r => {
    r.classList.toggle('visible', !isOpen);
  });
}

// ── 필터 ─────────────────────────────────────────────────────
function getFilters() {
  return {
    vendor:   document.getElementById('f-vendor').value.trim().toLowerCase(),
    acct:     document.getElementById('f-acct').value.trim().toLowerCase(),
    desc:     document.getElementById('f-desc').value.trim().toLowerCase(),
    vno:      document.getElementById('f-vno').value.trim(),
    vtype:    document.getElementById('f-vtype').value,
    dateFrom: document.getElementById('f-date-from').value.trim(),
    dateTo:   document.getElementById('f-date-to').value.trim(),
    amtMin:   document.getElementById('f-amt-min').value,
    amtMax:   document.getElementById('f-amt-max').value,
    balanced: document.getElementById('f-balanced').value,
    matched:  document.getElementById('f-matched').value,
    src:      document.getElementById('f-src').value,
    writer:   document.getElementById('f-writer').value,
    currency: document.getElementById('f-currency').value,
  };
}

function matchesFilter(v, f) {
  if (f.vendor   && !v.vendor.toLowerCase().includes(f.vendor))     return false;
  if (f.vno      && !v.vno.includes(f.vno))                         return false;
  if (f.vtype    && v.vtype    !== f.vtype)                          return false;
  if (f.balanced && v.balanced !== f.balanced)                       return false;
  if (f.matched  && String(v.matched ? 1 : 0) !== f.matched)        return false;
  if (f.src      && v.src      !== f.src)                            return false;
  if (f.writer   && v.writer   !== f.writer)                         return false;
  if (f.currency && v.currency !== f.currency)                       return false;
  if (f.dateFrom && v.date < f.dateFrom)                             return false;
  if (f.dateTo   && v.date > f.dateTo)                               return false;
  if (f.amtMin   && v.dr_total < Number(f.amtMin))                   return false;
  if (f.amtMax   && v.dr_total > Number(f.amtMax))                   return false;

  // 계정코드/명: 분개 라인 검색
  if (f.acct) {
    const hit = v.lines.some(l =>
      l.dr_code.toLowerCase().includes(f.acct) ||
      l.dr_name.toLowerCase().includes(f.acct) ||
      l.cr_code.toLowerCase().includes(f.acct) ||
      l.cr_name.toLowerCase().includes(f.acct)
    );
    if (!hit) return false;
  }

  // 적요: 분개 라인 검색
  if (f.desc) {
    const hit = v.lines.some(l =>
      l.dr_desc.toLowerCase().includes(f.desc) ||
      l.cr_desc.toLowerCase().includes(f.desc)
    );
    if (!hit) return false;
  }

  return true;
}

// ── 렌더링 ───────────────────────────────────────────────────
function render() {
  const f       = getFilters();
  const tbody   = document.getElementById('tbody');
  const noRes   = document.getElementById('no-result');
  const filtered = DATA.filter(v => matchesFilter(v, f));

  // 클릭용 전역 참조 등록
  filtered.forEach((v, i) => { window['v_' + i] = v; });

  let html = '';
  filtered.forEach((v, i) => {
    html += vrowHtml(v, i);
    html += linesHtml(v, i);
  });

  tbody.innerHTML = html;

  const drSum = filtered.reduce((s, v) => s + (v.dr_total || 0), 0);
  const crSum = filtered.reduce((s, v) => s + (v.cr_total || 0), 0);

  document.getElementById('res-count').textContent = filtered.length.toLocaleString();
  document.getElementById('res-dr').textContent    = fmt(drSum);
  document.getElementById('res-cr').textContent    = fmt(crSum);
  document.getElementById('ft-count').textContent  = filtered.length.toLocaleString();
  document.getElementById('ft-dr').textContent     = fmt(drSum);
  document.getElementById('ft-cr').textContent     = fmt(crSum);

  noRes.style.display = filtered.length === 0 ? 'block' : 'none';
}

function resetFilters() {
  ['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
    .forEach(id => document.getElementById(id).value = '');
  ['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
    .forEach(id => document.getElementById(id).value = '');
  setActiveCard(null);
  render();
}

// ── 요약 카드 클릭 필터 ──────────────────────────────────────
function cardFilter(type) {
  // 기존 필터 초기화
  ['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
    .forEach(id => document.getElementById(id).value = '');
  ['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
    .forEach(id => document.getElementById(id).value = '');

  if (type === 'bal-o')   document.getElementById('f-balanced').value = 'O';
  if (type === 'bal-x')   document.getElementById('f-balanced').value = 'X';
  if (type === 'matched') document.getElementById('f-matched').value  = '1';
  if (type === 'ng')      document.getElementById('f-matched').value  = '0';

  setActiveCard(type);
  render();
}

function setActiveCard(type) {
  ['all','bal-o','bal-x','matched','ng'].forEach(t => {
    const el = document.getElementById('card-' + t);
    if (el) el.classList.toggle('active', t === type);
  });
}

// ── 이벤트 바인딩 ────────────────────────────────────────────
['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
  .forEach(id => document.getElementById(id).addEventListener('input', () => { setActiveCard(null); render(); }));
['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
  .forEach(id => document.getElementById(id).addEventListener('change', () => { setActiveCard(null); render(); }));

// ── 초기 렌더 ────────────────────────────────────────────────
render();
</script>
