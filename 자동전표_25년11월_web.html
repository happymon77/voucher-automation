<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>25년11월 전표 통합 조회</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; font-size: 13px; background: #f0f2f5; color: #222; }

  /* 헤더 */
  .page-header { background: #1a3a5c; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 16px; }
  .page-header h1 { font-size: 16px; font-weight: 600; }
  .page-header .gen-time { font-size: 11px; color: #aac4e0; margin-left: auto; }

  /* 요약 카드 */
  .summary { display: flex; gap: 10px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #dde; }
  .card { flex: 1; background: #f7f9fc; border: 1px solid #dde; border-radius: 6px; padding: 10px 14px; text-align: center; }
  .card .num { font-size: 22px; font-weight: 700; }
  .card .lbl { font-size: 11px; color: #666; margin-top: 2px; }
  .card.ok   .num { color: #1a6e3a; }
  .card.warn .num { color: #c47700; }
  .card.bad  .num { color: #b82020; }
  .card.info .num { color: #1a3a5c; }
  .card { cursor: pointer; transition: transform .1s, box-shadow .1s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 3px 8px rgba(0,0,0,.12); }
  .card.active { outline: 2px solid #1a3a5c; background: #dde8f5; }

  /* 필터 */
  .filter-wrap { background: #fff; border-bottom: 1px solid #dde; padding: 10px 16px; }
  .filter-row  { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; margin-bottom: 6px; }
  .filter-row:last-child { margin-bottom: 0; }
  .fg { display: flex; flex-direction: column; gap: 3px; }
  .fg label { font-size: 11px; color: #555; font-weight: 600; }
  .fg input, .fg select {
    border: 1px solid #ccc; border-radius: 4px; padding: 5px 8px;
    font-size: 12px; font-family: inherit; background: #fafafa;
  }
  .fg input { width: 160px; }
  .fg.narrow input { width: 110px; }
  .fg.wide   input { width: 200px; }
  .fg select { width: 110px; }
  .fg.date   input { width: 120px; }
  .btn-search {
    padding: 5px 16px; background: #1a3a5c; color: #fff; border: none;
    border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit;
    align-self: flex-end; height: 30px; font-weight: 600;
  }
  .btn-search:hover { background: #254e7a; }
  .btn-reset {
    padding: 5px 14px; background: #e0e4ea; border: 1px solid #bbb;
    border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit;
    align-self: flex-end; height: 30px;
  }
  .btn-reset:hover { background: #cdd3db; }

  /* 결과 바 */
  .result-bar {
    padding: 7px 16px; background: #eef2f7; border-bottom: 1px solid #dde;
    display: flex; align-items: center; gap: 16px; font-size: 12px; color: #444;
  }
  .result-bar strong { color: #1a3a5c; }
  .result-bar .totals { margin-left: auto; color: #555; }

  /* 테이블 */
  .table-wrap { padding: 0; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #1a3a5c; color: #fff; position: sticky; top: 0; z-index: 10; }
  thead th { padding: 8px 10px; text-align: left; font-size: 12px; white-space: nowrap; border-right: 1px solid #2d5080; }
  thead th:last-child { border-right: none; }

  /* 전표 행 */
  tr.v-row { cursor: pointer; background: #fff; border-bottom: 1px solid #e4e8ef; }
  tr.v-row:hover { background: #eef3fb; }
  tr.v-row.open  { background: #e6f0fc; }
  tr.v-row td { padding: 7px 10px; vertical-align: middle; white-space: nowrap; font-size: 12px; }
  .toggle-btn { display: inline-block; width: 18px; text-align: center; color: #1a3a5c; font-weight: bold; }

  /* 분개 행 */
  tr.line-row { background: #f5f8fd; display: none; }
  tr.line-row.visible { display: table-row; }
  tr.line-row td { padding: 5px 10px 5px 32px; font-size: 11px; color: #444; border-bottom: 1px solid #e4e8ef; }
  tr.line-row:last-child td { border-bottom: 2px solid #c0cfe0; }

  /* 배지 */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-ok   { background: #d4edda; color: #1a6e3a; }
  .badge-bad  { background: #fde; color: #b82020; }
  .badge-warn { background: #fff3cd; color: #856404; }
  .badge-gray { background: #e8e8e8; color: #555; }

  /* 금액 */
  .amt { text-align: right; font-variant-numeric: tabular-nums; }

  /* 전표번호 링크 */
  .vno-link {
    color: #1a3a5c; text-decoration: underline; cursor: pointer; font-weight: 600;
  }
  .vno-link:hover { color: #254e7a; }

  /* 증빙 버튼 */
  .ev-btn { cursor: pointer; }
  .ev-btn:hover { opacity: 0.8; transform: scale(1.05); display: inline-block; }

  /* ── PDF 뷰어 모달 ── */
  .viewer-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 1000;
    align-items: center; justify-content: center;
  }
  .viewer-backdrop.open { display: flex; }
  .viewer-box {
    background: #1e2a38; border-radius: 8px;
    width: 92vw; height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    overflow: hidden;
  }
  /* 상단 바 */
  .viewer-topbar {
    background: #1a3a5c; color: #fff;
    padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    flex-shrink: 0; flex-wrap: wrap;
  }
  .viewer-title { font-size: 13px; font-weight: 600; margin-right: 4px; }
  /* 파일 탭 */
  .vtab {
    padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
    background: rgba(255,255,255,.15); color: #cde; border: 1px solid transparent;
    white-space: nowrap;
  }
  .vtab:hover { background: rgba(255,255,255,.25); }
  .vtab.active { background: #fff; color: #1a3a5c; font-weight: 700; border-color: #fff; }
  /* 줌 컨트롤 */
  .viewer-zoom { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .zoom-btn {
    padding: 3px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
    background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3);
  }
  .zoom-btn:hover { background: rgba(255,255,255,.3); }
  .zoom-level {
    min-width: 44px; text-align: center; font-size: 12px; color: #aac4e0;
  }
  /* 닫기 버튼 */
  .viewer-close {
    margin-left: 8px; padding: 4px 12px; border-radius: 4px;
    background: #b82020; color: #fff; border: none; cursor: pointer;
    font-size: 13px; font-weight: 700;
  }
  .viewer-close:hover { background: #d42020; }
  /* iframe 영역 */
  .viewer-body {
    flex: 1; overflow: auto; background: #2c3e50;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 12px;
  }
  .viewer-body iframe {
    border: none; background: #fff;
    transform-origin: top center;
    transition: transform .15s;
  }

  /* 출처 */
  .src-badge { display: inline-block; width: 22px; height: 22px; line-height: 22px;
    border-radius: 50%; text-align: center; font-size: 11px; font-weight: 700;
    background: #1a3a5c; color: #fff; }

  /* 하단 집계 */
  .footer { background: #1a3a5c; color: #fff; padding: 10px 16px; font-size: 12px;
    display: flex; gap: 24px; align-items: center; }
  .footer .f-lbl { color: #aac4e0; }
  .footer .f-val { font-weight: 700; font-size: 14px; }

  /* 빈 결과 */
  .no-result { text-align: center; padding: 40px; color: #999; font-size: 14px; }
</style>
</head>
<body>

<div class="page-header">
  <h1>25년 11월 전표 통합 조회</h1>
  <span class="gen-time">생성: 2026-04-16 14:27</span>
</div>

<!-- 요약 카드 -->
<div class="summary">
  <div class="card info" onclick="cardFilter('all')"     id="card-all">     <div class="num">145</div><div class="lbl">전체 전표</div></div>
  <div class="card ok"   onclick="cardFilter('bal-o')"   id="card-bal-o">   <div class="num">134</div><div class="lbl">대차 균형(O)</div></div>
  <div class="card bad"  onclick="cardFilter('bal-x')"   id="card-bal-x">   <div class="num">11</div><div class="lbl">대차 불균형(X)</div></div>
  <div class="card ok"   onclick="cardFilter('matched')" id="card-matched"> <div class="num">110</div><div class="lbl">증빙 매칭</div></div>
  <div class="card warn" onclick="cardFilter('ng')"      id="card-ng">      <div class="num">35</div><div class="lbl">증빙 NG</div></div>
</div>

<!-- 필터 -->
<div class="filter-wrap">
  <div class="filter-row">
    <div class="fg wide"><label>거래처명</label><input id="f-vendor" type="text" placeholder="거래처명 검색..."></div>
    <div class="fg wide"><label>계정코드 / 계정명</label><input id="f-acct" type="text" placeholder="코드 또는 명칭..."></div>
    <div class="fg wide"><label>적요</label><input id="f-desc" type="text" placeholder="적요 키워드..."></div>
    <div class="fg narrow"><label>전표번호</label><input id="f-vno" type="text" placeholder="전표번호..."></div>
    <div class="fg"><label>전표유형</label>
      <select id="f-vtype">
        <option value="">전체</option>
        <option>AF</option><option>KR</option><option>SA</option>
      </select>
    </div>
    <button class="btn-search" onclick="render()">검색</button>
    <button class="btn-reset"  onclick="resetFilters()">초기화</button>
  </div>
  <div class="filter-row">
    <div class="fg date"><label>전기일자 시작</label><input id="f-date-from" type="text" placeholder="2025.11.01"></div>
    <div class="fg date"><label>전기일자 종료</label><input id="f-date-to"   type="text" placeholder="2025.11.30"></div>
    <div class="fg narrow"><label>금액 이상</label><input id="f-amt-min" type="number" placeholder="0" style="width:120px"></div>
    <div class="fg narrow"><label>금액 이하</label><input id="f-amt-max" type="number" placeholder="" style="width:120px"></div>
    <div class="fg"><label>대차균형</label>
      <select id="f-balanced">
        <option value="">전체</option>
        <option value="O">균형(O)</option>
        <option value="X">불균형(X)</option>
      </select>
    </div>
    <div class="fg"><label>증빙 매칭</label>
      <select id="f-matched">
        <option value="">전체</option>
        <option value="1">매칭</option>
        <option value="0">NG</option>
      </select>
    </div>
    <div class="fg"><label>출처 PDF</label>
      <select id="f-src">
        <option value="">전체</option>
        <option value="1">1.pdf</option>
        <option value="2">2.pdf</option>
        <option value="3">3.pdf</option>
        <option value="4">4.pdf</option>
        <option value="5">5.pdf</option>
      </select>
    </div>
    <div class="fg"><label>작성자</label>
      <select id="f-writer"><option value="">전체</option></select>
    </div>
    <div class="fg"><label>통화</label>
      <select id="f-currency"><option value="">전체</option></select>
    </div>
  </div>
</div>

<!-- 결과 바 -->
<div class="result-bar">
  <span>조회결과: <strong id="res-count">0</strong>건</span>
  <span class="totals">
    차변합계: <strong id="res-dr">0</strong> &nbsp;|&nbsp;
    대변합계: <strong id="res-cr">0</strong>
  </span>
</div>

<!-- 테이블 -->
<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th style="width:24px"></th>
        <th>PDF</th>
        <th>전표번호</th>
        <th>유형</th>
        <th>전기일자</th>
        <th>거래처명</th>
        <th>작성자</th>
        <th>차변합계</th>
        <th>대변합계</th>
        <th>대차균형</th>
        <th>증빙</th>
        <th>비고</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-result" id="no-result" style="display:none">조회 결과가 없습니다.</div>
</div>

<!-- PDF 뷰어 모달 -->
<div class="viewer-backdrop" id="viewer-backdrop" onclick="closeViewer(event)">
  <div class="viewer-box" onclick="event.stopPropagation()">
    <div class="viewer-topbar" id="viewer-topbar">
      <span class="viewer-title" id="viewer-title"></span>
      <div id="viewer-tabs"></div>
      <div class="viewer-zoom">
        <button class="zoom-btn" onclick="zoomStep(-1)">－</button>
        <span class="zoom-level" id="zoom-level">100%</span>
        <button class="zoom-btn" onclick="zoomStep(+1)">＋</button>
        <button class="zoom-btn" onclick="zoomFit()">맞춤</button>
      </div>
      <button class="viewer-close" onclick="closeViewer()">✕ 닫기</button>
    </div>
    <div class="viewer-body" id="viewer-body">
      <iframe id="viewer-iframe" src="" style="width:850px; height:1100px;"></iframe>
    </div>
  </div>
</div>

<!-- 하단 집계 -->
<div class="footer">
  <span><span class="f-lbl">조회 건수</span>&nbsp;<span class="f-val" id="ft-count">0</span></span>
  <span><span class="f-lbl">차변합계</span>&nbsp;<span class="f-val" id="ft-dr">0</span></span>
  <span><span class="f-lbl">대변합계</span>&nbsp;<span class="f-val" id="ft-cr">0</span></span>
</div>

<script>
const DATA = __DATA_PLACEHOLDER__;

// ── 드롭다운 옵션 동적 생성 ──────────────────────────────────
function populateDropdown(selId, values) {
  const sel = document.getElementById(selId);
  [...new Set(values)].filter(Boolean).sort().forEach(v => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = v;
    sel.appendChild(opt);
  });
}
populateDropdown('f-writer',   DATA.map(v => v.writer));
populateDropdown('f-currency', DATA.map(v => v.currency));

// ── 금액 포맷 ────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '';
  return Number(n).toLocaleString('ko-KR');
}

// ── 전표 행 HTML ─────────────────────────────────────────────
function vrowHtml(v, idx) {
  const balBadge = v.balanced === 'O'
    ? '<span class="badge badge-ok">O</span>'
    : '<span class="badge badge-bad">X</span>';

  const matchBadge = v.matched
    ? `<span class="badge badge-ok ev-btn" onclick="openEv(event,v_${idx})">매칭</span>`
    : `<span class="badge badge-warn ev-btn" onclick="openEv(event,v_${idx})">NG</span>`;

  const vnoCell = v.pdf_jyo
    ? `<span class="vno-link" onclick="openPdf(event,'${v.pdf_jyo}')">${v.vno}</span>`
    : v.vno;

  return `<tr class="v-row" data-idx="${idx}" onclick="toggleLines(this)">
    <td><span class="toggle-btn">▶</span></td>
    <td><span class="src-badge">${v.src}</span></td>
    <td>${vnoCell}</td>
    <td><span class="badge badge-gray">${v.vtype}</span></td>
    <td>${v.date}</td>
    <td>${v.vendor}</td>
    <td>${v.writer}</td>
    <td class="amt">${fmt(v.dr_total)}</td>
    <td class="amt">${fmt(v.cr_total)}</td>
    <td>${balBadge}</td>
    <td>${matchBadge}</td>
    <td style="color:#999;font-size:11px">${v.bigo}</td>
  </tr>`;
}

// ── 분개 라인 HTML ───────────────────────────────────────────
function linesHtml(v, idx) {
  if (!v.lines.length) return '';
  return v.lines.map(l => `
    <tr class="line-row" data-parent="${idx}">
      <td colspan="2"></td>
      <td colspan="2" style="color:#555">
        <span style="color:#1a6e3a;font-weight:600">차)</span>
        ${l.dr_code} ${l.dr_name}
        ${l.dr_bp ? `<span style="color:#888">(${l.dr_bp})</span>` : ""}
      </td>
      <td class="amt" style="color:#1a6e3a">${fmt(l.dr_amt)}</td>
      <td colspan="2" style="color:#888;font-size:11px">${l.dr_desc}</td>
      <td colspan="2" style="color:#555">
        <span style="color:#b82020;font-weight:600">대)</span>
        ${l.cr_code} ${l.cr_name}
        ${l.cr_bp ? `<span style="color:#888">(${l.cr_bp})</span>` : ""}
      </td>
      <td class="amt" style="color:#b82020">${fmt(l.cr_amt)}</td>
      <td colspan="2" style="color:#888;font-size:11px">${l.cr_desc}</td>
    </tr>`).join('');
}

// ── PDF 뷰어 ────────────────────────────────────────────────
let _viewerFiles = [];
let _viewerIdx   = 0;
let _zoomLevels  = [50, 75, 100, 125, 150, 175, 200];
let _zoomIdx     = 2;  // 기본 100%

function openViewer(e, files, title) {
  e.stopPropagation();
  if (!files || files.length === 0) {
    alert('PDF 파일이 없습니다.');
    return;
  }
  _viewerFiles = files;
  _viewerIdx   = 0;
  _zoomIdx     = 2;
  document.getElementById('viewer-title').textContent = title;
  renderViewerTabs();
  loadViewerFile(0);
  applyZoom();
  document.getElementById('viewer-backdrop').classList.add('open');
}

function renderViewerTabs() {
  const tabs = document.getElementById('viewer-tabs');
  tabs.innerHTML = _viewerFiles.map((f, i) => {
    const label = f.includes('_전표') ? '전표'
                : f.replace(/.*_증빙(\d+)\.pdf/, '증빙$1');
    return `<span class="vtab ${i===_viewerIdx?'active':''}" onclick="loadViewerFile(${i})">${label}</span>`;
  }).join('');
}

function loadViewerFile(idx) {
  _viewerIdx = idx;
  const iframe = document.getElementById('viewer-iframe');
  iframe.src = _viewerFiles[idx];
  // 탭 active 갱신
  document.querySelectorAll('.vtab').forEach((t,i) =>
    t.classList.toggle('active', i === idx));
}

function applyZoom() {
  const pct = _zoomLevels[_zoomIdx];
  const iframe = document.getElementById('viewer-iframe');
  iframe.style.transform = `scale(${pct/100})`;
  iframe.style.marginBottom = `${(pct/100 - 1) * 1100}px`;
  document.getElementById('zoom-level').textContent = pct + '%';
}

function zoomStep(dir) {
  _zoomIdx = Math.max(0, Math.min(_zoomLevels.length - 1, _zoomIdx + dir));
  applyZoom();
}

function zoomFit() {
  _zoomIdx = 2;  // 100%
  applyZoom();
}

function closeViewer(e) {
  if (e && e.target !== document.getElementById('viewer-backdrop')) return;
  document.getElementById('viewer-backdrop').classList.remove('open');
  document.getElementById('viewer-iframe').src = '';
}

function openPdf(e, path) {
  openViewer(e, [path], path.split('/').pop().replace('_전표.pdf',''));
}

function openEv(e, v) {
  e.stopPropagation();
  if (!v || !v.pdf_jeung || v.pdf_jeung.length === 0) {
    alert('증빙 PDF 파일이 없습니다.');
    return;
  }
  openViewer(e, v.pdf_jeung, '전표 ' + v.vno + ' 증빙');
}

// ── 펼치기/접기 ──────────────────────────────────────────────
function toggleLines(row) {
  const idx = row.dataset.idx;
  const isOpen = row.classList.contains('open');
  row.classList.toggle('open', !isOpen);
  row.querySelector('.toggle-btn').textContent = isOpen ? '▶' : '▼';
  document.querySelectorAll(`.line-row[data-parent="${idx}"]`).forEach(r => {
    r.classList.toggle('visible', !isOpen);
  });
}

// ── 필터 ─────────────────────────────────────────────────────
function getFilters() {
  return {
    vendor:   document.getElementById('f-vendor').value.trim().toLowerCase(),
    acct:     document.getElementById('f-acct').value.trim().toLowerCase(),
    desc:     document.getElementById('f-desc').value.trim().toLowerCase(),
    vno:      document.getElementById('f-vno').value.trim(),
    vtype:    document.getElementById('f-vtype').value,
    dateFrom: document.getElementById('f-date-from').value.trim(),
    dateTo:   document.getElementById('f-date-to').value.trim(),
    amtMin:   document.getElementById('f-amt-min').value,
    amtMax:   document.getElementById('f-amt-max').value,
    balanced: document.getElementById('f-balanced').value,
    matched:  document.getElementById('f-matched').value,
    src:      document.getElementById('f-src').value,
    writer:   document.getElementById('f-writer').value,
    currency: document.getElementById('f-currency').value,
  };
}

function matchesFilter(v, f) {
  if (f.vendor   && !v.vendor.toLowerCase().includes(f.vendor))     return false;
  if (f.vno      && !v.vno.includes(f.vno))                         return false;
  if (f.vtype    && v.vtype    !== f.vtype)                          return false;
  if (f.balanced && v.balanced !== f.balanced)                       return false;
  if (f.matched  && String(v.matched ? 1 : 0) !== f.matched)        return false;
  if (f.src      && v.src      !== f.src)                            return false;
  if (f.writer   && v.writer   !== f.writer)                         return false;
  if (f.currency && v.currency !== f.currency)                       return false;
  if (f.dateFrom && v.date < f.dateFrom)                             return false;
  if (f.dateTo   && v.date > f.dateTo)                               return false;
  if (f.amtMin   && v.dr_total < Number(f.amtMin))                   return false;
  if (f.amtMax   && v.dr_total > Number(f.amtMax))                   return false;

  // 계정코드/명: 분개 라인 검색
  if (f.acct) {
    const hit = v.lines.some(l =>
      l.dr_code.toLowerCase().includes(f.acct) ||
      l.dr_name.toLowerCase().includes(f.acct) ||
      l.cr_code.toLowerCase().includes(f.acct) ||
      l.cr_name.toLowerCase().includes(f.acct)
    );
    if (!hit) return false;
  }

  // 적요: 분개 라인 검색
  if (f.desc) {
    const hit = v.lines.some(l =>
      l.dr_desc.toLowerCase().includes(f.desc) ||
      l.cr_desc.toLowerCase().includes(f.desc)
    );
    if (!hit) return false;
  }

  return true;
}

// ── 렌더링 ───────────────────────────────────────────────────
function render() {
  const f       = getFilters();
  const tbody   = document.getElementById('tbody');
  const noRes   = document.getElementById('no-result');
  const filtered = DATA.filter(v => matchesFilter(v, f));

  // 클릭용 전역 참조 등록
  filtered.forEach((v, i) => { window['v_' + i] = v; });

  let html = '';
  filtered.forEach((v, i) => {
    html += vrowHtml(v, i);
    html += linesHtml(v, i);
  });

  tbody.innerHTML = html;

  const drSum = filtered.reduce((s, v) => s + (v.dr_total || 0), 0);
  const crSum = filtered.reduce((s, v) => s + (v.cr_total || 0), 0);

  document.getElementById('res-count').textContent = filtered.length.toLocaleString();
  document.getElementById('res-dr').textContent    = fmt(drSum);
  document.getElementById('res-cr').textContent    = fmt(crSum);
  document.getElementById('ft-count').textContent  = filtered.length.toLocaleString();
  document.getElementById('ft-dr').textContent     = fmt(drSum);
  document.getElementById('ft-cr').textContent     = fmt(crSum);

  noRes.style.display = filtered.length === 0 ? 'block' : 'none';
}

function resetFilters() {
  ['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
    .forEach(id => document.getElementById(id).value = '');
  ['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
    .forEach(id => document.getElementById(id).value = '');
  setActiveCard(null);
  render();
}

// ── 요약 카드 클릭 필터 ──────────────────────────────────────
function cardFilter(type) {
  // 기존 필터 초기화
  ['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
    .forEach(id => document.getElementById(id).value = '');
  ['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
    .forEach(id => document.getElementById(id).value = '');

  if (type === 'bal-o')   document.getElementById('f-balanced').value = 'O';
  if (type === 'bal-x')   document.getElementById('f-balanced').value = 'X';
  if (type === 'matched') document.getElementById('f-matched').value  = '1';
  if (type === 'ng')      document.getElementById('f-matched').value  = '0';

  setActiveCard(type);
  render();
}

function setActiveCard(type) {
  ['all','bal-o','bal-x','matched','ng'].forEach(t => {
    const el = document.getElementById('card-' + t);
    if (el) el.classList.toggle('active', t === type);
  });
}

// ── 이벤트 바인딩 ────────────────────────────────────────────
['f-vendor','f-acct','f-desc','f-vno','f-date-from','f-date-to','f-amt-min','f-amt-max']
  .forEach(id => document.getElementById(id).addEventListener('input', () => { setActiveCard(null); render(); }));
['f-vtype','f-balanced','f-matched','f-src','f-writer','f-currency']
  .forEach(id => document.getElementById(id).addEventListener('change', () => { setActiveCard(null); render(); }));

// ── 초기 렌더 ────────────────────────────────────────────────
render();
</script>
</body>
</html>
